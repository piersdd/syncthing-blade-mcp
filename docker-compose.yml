---
# Syncthing MCP — Streamable HTTP deployment behind Traefik
#
# Deploy on tn-sb (or any Docker host with Traefik already running).
# Copy .env.example to .env and fill in API keys before starting.

services:
  syncthing-blade-mcp:
    build: .
    container_name: syncthing-blade-mcp
    restart: unless-stopped
    env_file: .env
    environment:
      MCP_TRANSPORT: streamable-http
      MCP_HOST: "0.0.0.0"
      MCP_PORT: "8000"
    expose:
      - "8000"
    networks:
      - traefik
    labels:
      traefik.enable: "true"
      traefik.http.routers.syncthing-blade-mcp.rule: Host(`syncthing-blade-mcp.${DOMAIN:?set DOMAIN in .env}`)
      traefik.http.routers.syncthing-blade-mcp.entrypoints: websecure
      traefik.http.routers.syncthing-blade-mcp.tls.certresolver: letsencrypt
      traefik.http.services.syncthing-blade-mcp.loadbalancer.server.port: "8000"
      traefik.http.services.syncthing-blade-mcp.loadbalancer.healthcheck.path: /health
      traefik.http.services.syncthing-blade-mcp.loadbalancer.healthcheck.interval: 30s

networks:
  traefik:
    external: true
